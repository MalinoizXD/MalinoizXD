name: Update Github Stat

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1.1.0
        with:
          card: stats
          options: username=${{ github.repository_owner }}&count_private=true&theme=tokyonight&show_icons=true&rank_icon=github&include_all_commits=true&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1.1.0
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&theme=tokyonight&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate trophy SVG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          mkdir -p profile
          python3 - << 'PYEOF'
import json, os, urllib.request, textwrap

username = os.environ['USERNAME']
token = os.environ['GH_TOKEN']

req = urllib.request.Request(
    f'https://api.github.com/users/{username}',
    headers={'Authorization': f'token {token}', 'Accept': 'application/vnd.github.v3+json'}
)
with urllib.request.urlopen(req) as r:
    user = json.loads(r.read())

repos_req = urllib.request.Request(
    f'https://api.github.com/users/{username}/repos?per_page=100&type=owner',
    headers={'Authorization': f'token {token}', 'Accept': 'application/vnd.github.v3+json'}
)
with urllib.request.urlopen(repos_req) as r:
    repos = json.loads(r.read())

total_stars = sum(repo.get('stargazers_count', 0) for repo in repos)
followers = user.get('followers', 0)
public_repos = user.get('public_repos', 0)

def get_level(value, thresholds):
    labels = ['C', 'B', 'A', 'S', 'SS', 'SSS']
    for i, t in enumerate(thresholds):
        if value < t:
            return labels[i]
    return 'SSS'

trophies = [
    ('Stars', str(total_stars), get_level(total_stars, [10,50,100,500,1000,5000]), '#FFD700'),
    ('Followers', str(followers), get_level(followers, [10,50,100,500,1000,5000]), '#C0C0C0'),
    ('Commits', '109+', 'A', '#CD7F32'),
    ('Repos', str(public_repos), get_level(public_repos, [5,10,20,50,100,200]), '#00CED1'),
    ('PRs', '2', 'B', '#9370DB'),
    ('Issues', '1', 'B', '#FF6347'),
]

W, H, cols = 800, 115, 6
cell_w = W // cols

parts = []
parts.append(f'<svg width="{W}" height="{H}" xmlns="http://www.w3.org/2000/svg">')
parts.append(f'<rect width="{W}" height="{H}" fill="#1a1b27" rx="10"/>')

for i, (name, count, rank, color) in enumerate(trophies):
    x = i * cell_w
    cx = x + cell_w // 2
    # trophy cup path scaled small
    tx = cx - 8
    ty = 40
    cup = f'M{tx+8},{ ty} L{tx+3},{ty+8} Q{tx+1},{ty+14} {tx+4},{ty+16} L{tx+6},{ty+16} L{tx+6},{ty+20} L{tx+2},{ty+22} L{tx+14},{ty+22} L{tx+10},{ty+20} L{tx+10},{ty+16} L{tx+12},{ty+16} Q{tx+15},{ty+14} {tx+13},{ty+8} Z'
    parts.append(f'<g>')
    parts.append(f'<rect x="{x+4}" y="4" width="{cell_w-8}" height="{H-8}" fill="#1f2335" rx="8" stroke="{color}" stroke-width="1.5"/>')
    parts.append(f'<text x="{cx}" y="22" text-anchor="middle" fill="{color}" font-size="10" font-family="monospace" font-weight="bold">{name}</text>')
    parts.append(f'<path d="{cup}" fill="{color}"/>')
    parts.append(f'<text x="{cx}" y="82" text-anchor="middle" fill="#a9b1d6" font-size="10" font-family="monospace">{count}</text>')
    parts.append(f'<text x="{cx}" y="100" text-anchor="middle" fill="{color}" font-size="12" font-family="monospace" font-weight="bold">{rank}</text>')
    parts.append(f'</g>')

parts.append('</svg>')

svg = '\n'.join(parts)
with open('profile/trophy.svg', 'w') as f:
    f.write(svg)
print('Trophy SVG generated successfully, size:', len(svg), 'bytes')
PYEOF

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README stat cards" || exit 0
          git push
